# Tangerine Lima VM Template
# Boots a Debian VM and runs base-setup.sh to install all tools.

# Debian 13 (Trixie) cloud images
images:
  - location: "https://cloud.debian.org/images/cloud/trixie/daily/latest/debian-13-generic-arm64-daily.qcow2"
    arch: "aarch64"
  - location: "https://cloud.debian.org/images/cloud/trixie/daily/latest/debian-13-generic-amd64-daily.qcow2"
    arch: "x86_64"

# Apple Virtualization.framework for better perf on macOS
vmType: "vz"
vmOpts:
  vz:
    rosetta:
      enabled: true
      binfmt: true

cpus: 4
memory: "8GiB"
disk: "20GiB"

ssh:
  localPort: 0
  loadDotSSHPubKeys: true
  forwardAgent: true

portForwards:
  - guestPort: 3456
    hostIP: "0.0.0.0"
    hostPort: 3456

# Mount tangerine data — DB, config, credentials survive VM rebuilds.
mounts:
  - location: "~/tangerine"
    mountPoint: "/home/tung.linux/tangerine"
    writable: true
  - location: "~/.config/gh"
    mountPoint: "/home/tung.linux/.config/gh"
    writable: false
  - location: "~/.config/tmux"
    mountPoint: "/home/tung.linux/.config/tmux"
    writable: false

provision:
  - mode: system
    script: |
      #!/bin/bash
      /home/tung.linux/tangerine/base-setup.sh
  - mode: user
    script: |
      #!/bin/bash
      CREDS="/home/tung.linux/tangerine/.credentials"
      if [ -f "$CREDS" ]; then
        # Export all credentials to shell
        echo 'set -a' >> ~/.bashrc
        echo '. /home/tung.linux/tangerine/.credentials' >> ~/.bashrc
        echo 'set +a' >> ~/.bashrc
      fi

      # GitHub Enterprise proxy setup.
      # Set GHE_PROXY in .credentials (e.g. GHE_PROXY=socks5://127.0.0.1:8080).
      # Lima auto-rewrites 127.0.0.1 → host gateway so the host proxy is reachable.
      # This snippet runs on every shell login to keep git config in sync.
      cat >> ~/.bashrc << 'PROXY_EOF'
      if [ -n "${GHE_PROXY:-}" ]; then
        # gh CLI (Go binary) needs ALL_PROXY for SOCKS5 support
        export ALL_PROXY="$GHE_PROXY"
        export all_proxy="$GHE_PROXY"
        export NO_PROXY="localhost,127.0.0.1,host.lima.internal,0.0.0.0"
        export no_proxy="$NO_PROXY"
        # git uses libcurl which natively supports socks5h (DNS via proxy)
        # Replace socks5:// with socks5h:// so hostnames resolve through proxy
        git config --global http.proxy "${GHE_PROXY/socks5:/socks5h:}"
        git config --global https.proxy "${GHE_PROXY/socks5:/socks5h:}"
      fi
PROXY_EOF

message: |
  Tangerine VM ready. Next steps:
    1. Clone tangerine repo.
    2. Run: bun install && tangerine start.
