# Tangerine Lima VM Template
# Boots a Debian VM and runs base-setup.sh to install all tools.

# Debian 13 (Trixie) cloud images
images:
  - location: "https://cloud.debian.org/images/cloud/trixie/daily/latest/debian-13-generic-arm64-daily.qcow2"
    arch: "aarch64"
  - location: "https://cloud.debian.org/images/cloud/trixie/daily/latest/debian-13-generic-amd64-daily.qcow2"
    arch: "x86_64"

# Apple Virtualization.framework for better perf on macOS
vmType: "vz"
vmOpts:
  vz:
    rosetta:
      enabled: true
      binfmt: true

cpus: 4
memory: "8GiB"
disk: "20GiB"

ssh:
  localPort: 0
  loadDotSSHPubKeys: true
  forwardAgent: true

portForwards:
  - guestPort: 3456
    hostIP: "0.0.0.0"
    hostPort: 3456

# Mount tangerine data — DB, config, credentials survive VM rebuilds.
mounts:
  - location: "~/tangerine"
    mountPoint: "/home/tung.linux/tangerine"
    writable: true
  - location: "~/.config/gh"
    mountPoint: "/home/tung.linux/.config/gh"
    writable: false
  # dtach has no config file — no mount needed

provision:
  - mode: system
    script: |
      #!/bin/bash
      /home/tung.linux/tangerine/base-setup.sh
  - mode: user
    script: |
      #!/bin/bash
      CREDS="/home/tung.linux/tangerine/.credentials"
      if [ -f "$CREDS" ]; then
        # Export all credentials to shell
        echo 'set -a' >> ~/.bashrc
        echo '. /home/tung.linux/tangerine/.credentials' >> ~/.bashrc
        echo 'set +a' >> ~/.bashrc
      fi

      # GitHub Enterprise proxy setup.
      # Set in .credentials:
      #   GHE_PROXY=socks5://127.0.0.1:8080   (Lima rewrites 127.0.0.1 → host gateway)
      #   GHE_HOST=github.example.com          (your GHE hostname)
      # Only GHE traffic is proxied; github.com is accessed directly.
      cat >> ~/.bashrc << 'PROXY_EOF'
      if [ -n "${GHE_PROXY:-}" ] && [ -n "${GHE_HOST:-}" ]; then
        # git: per-host proxy so only GHE traffic is proxied, github.com goes direct
        # socks5h:// ensures hostnames resolve through the proxy (required for private GHE)
        git config --global "http.https://${GHE_HOST}.proxy" "${GHE_PROXY/socks5:/socks5h:}"
      fi
      PROXY_EOF

message: |
  Tangerine VM ready. Next steps:
    1. Clone tangerine repo.
    2. Run: bun install && tangerine start.
