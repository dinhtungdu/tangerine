# Tangerine Lima VM Template
# Golden image for running OpenCode agents in isolated VMs.
# Usage: limactl start --name tangerine-base src/image/tangerine.yaml

# Debian 13 (Trixie) cloud images
images:
  - location: "https://cloud.debian.org/images/cloud/trixie/daily/latest/debian-13-generic-arm64-daily.qcow2"
    arch: "aarch64"
  - location: "https://cloud.debian.org/images/cloud/trixie/daily/latest/debian-13-generic-amd64-daily.qcow2"
    arch: "x86_64"

# Apple Virtualization.framework for better perf on macOS
vmType: "vz"
vmOpts:
  vz:
    rosetta:
      enabled: true
      binfmt: true

cpus: 4
memory: "8GiB"
disk: "20GiB"

ssh:
  localPort: 0
  loadDotSSHPubKeys: true
  forwardAgent: true

# Use Lima's default user (matches host username).
# Lima injects SSH keys and grants passwordless sudo automatically.
# No custom user block needed — Lima handles everything.

# Disable Lima auto port-forwarding — VM services (MariaDB, Apache, etc.)
# must not steal host ports. Tangerine manages its own tunnels explicitly.
portForwards: []

# No host mounts — repos are cloned inside the VM
mounts: []

provision:
  - mode: system
    script: |
      #!/bin/bash
      set -eux -o pipefail
      export DEBIAN_FRONTEND=noninteractive

      # Disable IPv6 — Lima VZ shared networking has broken IPv6 causing ~150x slower downloads
      sysctl -w net.ipv6.conf.all.disable_ipv6=1
      sysctl -w net.ipv6.conf.default.disable_ipv6=1
      echo 'net.ipv6.conf.all.disable_ipv6 = 1' >> /etc/sysctl.d/99-disable-ipv6.conf
      echo 'net.ipv6.conf.default.disable_ipv6 = 1' >> /etc/sysctl.d/99-disable-ipv6.conf

      apt-get update -qq
      apt-get upgrade -y -qq

      apt-get install -y -qq \
        git \
        curl \
        jq \
        openssh-server \
        tmux \
        unzip \
        ca-certificates \
        gnupg

      # Node.js 22 LTS via nodesource
      mkdir -p /etc/apt/keyrings
      curl -fsSL https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key \
        | gpg --dearmor -o /etc/apt/keyrings/nodesource.gpg
      echo "deb [signed-by=/etc/apt/keyrings/nodesource.gpg] https://deb.nodesource.com/node_22.x nodistro main" \
        > /etc/apt/sources.list.d/nodesource.list
      apt-get update -qq
      apt-get install -y -qq nodejs

      # GitHub CLI (gh)
      mkdir -p -m 755 /etc/apt/keyrings
      curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg \
        | tee /etc/apt/keyrings/githubcli-archive-keyring.gpg > /dev/null
      chmod go+r /etc/apt/keyrings/githubcli-archive-keyring.gpg
      echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" \
        > /etc/apt/sources.list.d/github-cli.list
      apt-get update -qq
      apt-get install -y -qq gh

      # SSH — key-only auth, allow reverse tunnels to bind specific addresses
      sed -i 's/^#\?PasswordAuthentication.*/PasswordAuthentication no/' /etc/ssh/sshd_config
      sed -i 's/^#\?GatewayPorts.*/GatewayPorts clientspecified/' /etc/ssh/sshd_config

      # PHP + Composer (for projects like ciab-admin)
      apt-get install -y -qq php-cli php-xml php-mbstring php-curl
      curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer

      # pnpm
      npm install -g pnpm

      # Install OpenCode globally
      npm install -g opencode-ai

      # Install Claude Code CLI
      npm install -g @anthropic-ai/claude-code

      # Workspace directory (owned by Lima default user via user provision)
      mkdir -p /workspace

      # Cleanup
      apt-get clean
      rm -rf /var/lib/apt/lists/* /tmp/* /var/tmp/*

  # Install tangerine-task CLI for cross-project task creation
  - mode: system
    script: |
      #!/bin/bash
      set -eux -o pipefail
      cat > /usr/local/bin/tangerine-task << 'SCRIPT'
      #!/bin/bash
      # tangerine-task — CLI for cross-project task creation from inside a Tangerine VM.
      # Talks to the Tangerine server via reverse SSH tunnel on localhost.
      set -euo pipefail

      PORT="${TANGERINE_SERVER_PORT:-3456}"
      BASE="http://127.0.0.2:${PORT}"
      TASK_ID="${TANGERINE_TASK_ID:-}"

      usage() {
        echo "Usage: tangerine-task <command> [options]"
        echo ""
        echo "Commands:"
        echo "  projects              List available projects"
        echo "  create [options]      Create a task in another project"
        echo ""
        echo "Create options:"
        echo "  --project <name>      Target project (required)"
        echo "  --title <text>        Task title (required)"
        echo "  --description <text>  Task description"
        echo "  --provider <name>     Agent provider (opencode|claude-code)"
        echo "  --model <id>          Model override"
        exit 1
      }

      cmd_projects() {
        response=$(curl -sf "${BASE}/api/projects" 2>&1) || {
          echo "✗ Server unreachable (is the tunnel up?)" >&2
          exit 1
        }
        echo "$response" | jq -r '.projects[].name'
      }

      cmd_create() {
        local project="" title="" description="" provider="" model=""

        while [[ $# -gt 0 ]]; do
          case "$1" in
            --project)    project="$2"; shift 2 ;;
            --title)      title="$2"; shift 2 ;;
            --description) description="$2"; shift 2 ;;
            --provider)   provider="$2"; shift 2 ;;
            --model)      model="$2"; shift 2 ;;
            *) echo "✗ Unknown option: $1" >&2; exit 1 ;;
          esac
        done

        if [[ -z "$project" || -z "$title" ]]; then
          echo "✗ --project and --title are required" >&2
          exit 1
        fi

        if [[ -n "$TASK_ID" && -n "$description" ]]; then
          description="${description}

      ---
      Created from task ${TASK_ID}"
        elif [[ -n "$TASK_ID" && -z "$description" ]]; then
          description="Created from task ${TASK_ID}"
        fi

        payload=$(jq -n \
          --arg projectId "$project" \
          --arg title "$title" \
          --arg description "$description" \
          --arg provider "$provider" \
          --arg model "$model" \
          --arg source "cross-project" \
          --arg sourceId "$TASK_ID" \
          '{
            projectId: $projectId,
            title: $title,
            source: $source,
            sourceId: (if $sourceId != "" then $sourceId else null end),
            description: (if $description != "" then $description else null end),
            provider: (if $provider != "" then $provider else null end),
            model: (if $model != "" then $model else null end)
          } | with_entries(select(.value != null))'
        )

        response=$(curl -sf -X POST "${BASE}/api/tasks" \
          -H "Content-Type: application/json" \
          -d "$payload" 2>&1) || {
          error=$(echo "$response" | jq -r '.error // empty' 2>/dev/null || true)
          if [[ -n "$error" ]]; then
            echo "✗ $error" >&2
          else
            echo "✗ Server unreachable or request failed" >&2
          fi
          exit 1
        }

        task_id=$(echo "$response" | jq -r '.id')
        echo "✓ Task created: ${task_id} in project ${project}"
      }

      [[ $# -lt 1 ]] && usage

      case "$1" in
        projects) cmd_projects ;;
        create)   shift; cmd_create "$@" ;;
        -h|--help) usage ;;
        *) echo "✗ Unknown command: $1" >&2; usage ;;
      esac
      SCRIPT
      chmod +x /usr/local/bin/tangerine-task

  # Runs as the Lima default user (has passwordless sudo).
  # This stage runs after SSH keys are injected.
  - mode: user
    script: |
      #!/bin/bash
      set -eux -o pipefail

      # Take ownership of workspace
      sudo chown "$(whoami):$(whoami)" /workspace

      # git: allow operations in any directory
      git config --global safe.directory '*'

      # Pre-configure OpenCode
      mkdir -p ~/.config/opencode
      echo '{}' > ~/.config/opencode/opencode.json

message: |
  Tangerine VM ready!
  Workspace: /workspace
  User: Lima default (with passwordless sudo)
